services:
  - type: web
    name: checkadmin-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.prod.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: checkadmin_prod
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
